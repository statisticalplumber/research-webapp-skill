<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #1a1a1a; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { max-width: 96vw; max-height: 96vh; aspect-ratio: 16/9; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 8px; padding: 10px; }
        .gif-item { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #2a2a2a; border-radius: 4px; overflow: hidden; }
        .gif-item img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <div class="container">
        <div class="gif-item"><img src="gif/Recording 2026-04-15 212932.gif" alt="GIF"></div>
        <div class="gif-item"><img src="gif/Recording 2026-04-15 213208.gif" alt="GIF"></div>
        <div class="gif-item"><img src="gif/Recording 2026-04-15 213516.gif" alt="GIF"></div>
        <div class="gif-item"><img src="gif/Recording 2026-04-15 214055.gif" alt="GIF"></div>
        <div class="gif-item"><img src="gif/Recording 2026-04-15 214333.gif" alt="GIF"></div>
        <div class="gif-item"><img src="gif/Recording 2026-04-15 214534.gif" alt="GIF"></div>
        <div class="gif-item"><img src="gif/Recording 2026-04-15 215115.gif" alt="GIF"></div>
        <div class="gif-item"><img src="gif/Recording 2026-04-15 215307.gif" alt="GIF"></div>
        <div class="gif-item"><img src="gif/Recording 2026-04-15 221010.gif" alt="GIF"></div>
    </div>
</body>
</html>
